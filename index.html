<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Y2K WEATHER ✨</title>
    <style>
        :root {
            --hot-pink: #ff00de;
            --neon-blue: #00d4ff;
            --glitter-white: rgba(255, 255, 255, 0.8);
            --glass: rgba(255, 255, 255, 0.25);
            --box-glass: rgba(255, 255, 255, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: url('https://i.postimg.cc/v488LSw0/your-image.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            overflow: hidden;
        }

        /* The Glossy Y2K Card */
        .weather-container {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 3px solid white;
            border-radius: 40px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 0, 222, 0.5), 
                        inset 0 0 15px white;
            width: 85%;
            max-width: 350px;
            color: white;
            animation: float 4s ease-in-out infinite;
        }

        h1 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 2px 2px var(--hot-pink), -2px -2px var(--neon-blue);
        }

        #temp {
            font-size: 4.5rem;
            font-weight: bold;
            margin: 0;
            text-shadow: 0 0 15px var(--hot-pink), 2px 2px white;
        }

        #status {
            font-size: 1.1rem;
            background: white;
            color: var(--hot-pink);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 3px 3px 0px var(--neon-blue);
            margin-bottom: 20px;
        }

        /* ✨ THE CUTE LITTLE BOXES ✨ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: var(--box-glass);
            border: 2px solid white;
            border-radius: 15px;
            padding: 10px 5px;
            box-shadow: 2px 2px 10px rgba(255, 0, 222, 0.2);
            color: var(--hot-pink);
            font-weight: bold;
            text-shadow: 1px 1px white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .stat-icon {
            font-size: 1.5rem;
            margin-bottom: 2px;
            filter: drop-shadow(1px 1px 0px var(--neon-blue));
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: white;
            text-shadow: 1px 1px var(--hot-pink);
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 0.9rem;
            margin-top: 2px;
        }

        /* Floating Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        #loading {
            font-style: italic;
            animation: blink 1.5s infinite;
            text-shadow: 1px 1px var(--hot-pink);
            margin: 20px 0;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        .refresh-btn {
            background: linear-gradient(90deg, var(--neon-blue), var(--hot-pink));
            border: 2px solid white;
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: 0.2s;
            text-shadow: 1px 1px black;
        }

        .refresh-btn:active {
            box-shadow: 0 0px;
            transform: translateY(4px);
        }
    </style>
</head>
<body>

    <div class="weather-container">
        <h1>✨ Right Now ✨</h1>
        
        <div id="loading">Locating you, babe... 📍</div>
        
        <div id="weather-content" style="display:none;">
            <div id="temp">--°</div>
            <div id="status">VIBING</div>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-icon">💨</div>
                    <div class="stat-label">Wind</div>
                    <div class="stat-value"><span id="wind">--</span> mph</div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">💧</div>
                    <div class="stat-label">Humidity</div>
                    <div class="stat-value"><span id="humidity">--</span>%</div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">🫧</div>
                    <div class="stat-label">Pressure</div>
                    <div class="stat-value"><span id="pressure">--</span> in</div>
                </div>
            </div>
        </div>

        <button class="refresh-btn" onclick="fetchWeather()">REFRESH 🎀</button>
    </div>

    <script>
        // Mapping Open-Meteo codes to cute Y2K phrases
        const weatherMoji = {
            0: "Totally Sunny ☀️",
            1: "Cute & Clear ✨",
            2: "A Bit Cloudy ☁️",
            3: "Overcast Bummer 🌫️",
            45: "Foggy Mystery 🌫️",
            48: "Foggy Mystery 🌫️",
            51: "Light Drizzle 💧",
            53: "Drizzle 💧",
            55: "Heavy Drizzle 🌧️",
            61: "Rainy Day 🎀",
            63: "Steady Rain 🌧️",
            65: "Heavy Rain ☔",
            71: "Snowy Sparkles ❄️",
            73: "Snowing ❄️",
            75: "Heavy Snow ⛄",
            80: "Sparkly Showers 🌧️",
            81: "Heavy Showers ☔",
            82: "Pouring ☔",
            95: "Stormy Energy ⚡",
            96: "Thunderstorm 🌩️",
            99: "Crazy Storm 🌩️"
        };

        async function fetchWeather() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('weather-content').style.display = 'none';

            navigator.geolocation.getCurrentPosition(async (position) => {
                const { latitude, longitude } = position.coords;
                
                try {
                    // UPDATED API URL to grab exact current stats cleanly
                    const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,surface_pressure,wind_speed_10m,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch`;
                    
                    const response = await fetch(url);
                    const data = await response.json();
                    const current = data.current;

                    // Update UI with clean data
                    document.getElementById('temp').innerText = Math.round(current.temperature_2m) + "°";
                    document.getElementById('wind').innerText = Math.round(current.wind_speed_10m);
                    document.getElementById('humidity').innerText = current.relative_humidity_2m;
                    
                    // Convert pressure from hPa to inHg for standard US viewing
                    const pressureInHg = (current.surface_pressure * 0.02953).toFixed(1);
                    document.getElementById('pressure').innerText = pressureInHg;
                    
                    document.getElementById('status').innerText = weatherMoji[current.weather_code] || "Weathering it! 💅";

                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('weather-content').style.display = 'block';
                } catch (error) {
                    document.getElementById('loading').innerText = "Oops! Error fetching data. :(";
                }
            }, () => {
                document.getElementById('loading').innerText = "Please enable location! 📍";
            });
        }

        // Initial Load
        fetchWeather();
    </script>
</body>
</html>
