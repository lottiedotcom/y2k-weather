<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🫧 MERMAID WEATHER 🫧</title>
    <style>
        :root {
            /* The new Mermaid Moe Palette */
            --mermaid-aqua: #00f0ff;
            --moe-pink: #ff85c2;
            --pearl-glow: #ffffff;
            --deep-sea: #005f8a;
            --bubble-glass: rgba(200, 245, 255, 0.25);
            --inner-bubble: rgba(255, 255, 255, 0.4);
        }

        body {
            margin: 0;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background: url('https://i.postimg.cc/PCsjq3Sr/image.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
            overflow-y: auto;
            color: var(--deep-sea);
        }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bubble-glass); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--moe-pink); border-radius: 10px; border: 2px dotted white; }

        /* Main Bubble Container */
        .weather-container {
            background: var(--bubble-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 4px dotted var(--pearl-glow);
            border-radius: 50px; /* Extra round for bubble effect */
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.8);
            width: 85%;
            max-width: 350px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 0px;
            color: white;
            text-shadow: 2px 2px var(--moe-pink), -2px -2px var(--mermaid-aqua);
        }

        #location-name {
            font-size: 1rem;
            color: var(--deep-sea);
            text-shadow: 1px 1px white;
            margin-bottom: 15px;
            font-weight: bold;
            background: var(--inner-bubble);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px dashed var(--mermaid-aqua);
        }

        #temp {
            font-size: 5rem;
            font-weight: bold;
            margin: 0;
            color: white;
            text-shadow: 0 0 20px var(--mermaid-aqua), 3px 3px var(--moe-pink);
        }

        #feels-like {
            font-size: 0.95rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--moe-pink);
            text-shadow: 1px 1px white;
        }

        #status {
            font-size: 1.1rem;
            background: white;
            color: var(--mermaid-aqua);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 4px 4px 0px var(--moe-pink);
            margin-bottom: 20px;
            border: 2px solid var(--mermaid-aqua);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        /* Smaller internal bubbles */
        .stat-box, .wide-box, .celestial-box {
            background: var(--inner-bubble);
            border: 2px solid white;
            border-radius: 25px;
            padding: 12px 5px;
            box-shadow: 3px 3px 12px rgba(0, 240, 255, 0.2), inset -3px -3px 10px rgba(255,255,255,0.5);
            color: var(--deep-sea);
            font-weight: bold;
            text-shadow: 1px 1px 0px white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .wide-box { margin-bottom: 15px; padding: 15px; }
        .celestial-box { margin-bottom: 15px; padding: 15px; }

        .celestial-title {
            font-size: 0.85rem;
            color: var(--moe-pink);
            text-shadow: 1px 1px 0px white;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px dotted var(--mermaid-aqua);
            padding-bottom: 5px;
        }

        .celestial-grid {
            display: flex;
            justify-content: space-around;
            width: 100%;
        }

        .celestial-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-icon {
            font-size: 1.6rem;
            margin-bottom: 2px;
            filter: drop-shadow(2px 2px 0px white);
        }
        
        .custom-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%; /* Made circles for the bubble theme */
            object-fit: cover;
            margin-bottom: 4px;
            box-shadow: 0 0 8px var(--mermaid-aqua);
            border: 2px solid white;
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--moe-pink);
            letter-spacing: 1px;
            text-align: center;
            font-weight: 900;
        }

        .stat-value { font-size: 0.95rem; margin-top: 2px; text-align: center; color: var(--deep-sea);}
        .uv-message { font-size: 0.85rem; color: var(--moe-pink); margin-top: 5px; font-weight: bold;}

        .hourly-container {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .hourly-box {
            min-width: 65px;
            background: var(--inner-bubble);
            border: 2px solid white;
            border-radius: 20px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 2px 2px 8px rgba(0, 240, 255, 0.15);
        }

        .hourly-time { font-size: 0.75rem; color: var(--moe-pink); text-shadow: 1px 1px 0px white; margin-bottom: 3px; font-weight: bold;}
        .hourly-icon { font-size: 1.3rem; filter: drop-shadow(2px 2px 0px white); }
        .hourly-temp { font-size: 1rem; font-weight: bold; color: var(--mermaid-aqua); text-shadow: 1px 1px 0px white; margin-top: 3px; }

        .forecast-title {
            font-size: 1.2rem;
            margin: 15px 0 10px 0;
            color: white;
            text-shadow: 2px 2px var(--mermaid-aqua), -1px -1px var(--moe-pink);
            border-bottom: 3px dotted white;
            padding-bottom: 5px;
        }

        .forecast-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--inner-bubble);
            margin-bottom: 10px;
            padding: 12px 18px;
            border-radius: 25px;
            border: 2px solid white;
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--deep-sea);
            text-shadow: 1px 1px 0px white;
            box-shadow: 2px 2px 8px rgba(0, 240, 255, 0.1);
        }

        .forecast-day { width: 50px; text-align: left; color: var(--moe-pink); }
        .forecast-icon { font-size: 1.3rem; filter: drop-shadow(2px 2px 0px white); }
        .forecast-temps { width: 80px; text-align: right; }
        .min-temp { color: var(--mermaid-aqua); font-size: 0.85rem; margin-left: 5px;}

        #loading {
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            animation: bounce 1.5s infinite;
            text-shadow: 2px 2px var(--mermaid-aqua);
            margin: 20px 0;
        }

        @keyframes bounce { 
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .refresh-btn {
            background: linear-gradient(135deg, var(--mermaid-aqua), var(--moe-pink));
            border: 3px solid white;
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: 900;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 240, 255, 0.3), inset 0 -3px 0 rgba(0,0,0,0.1);
            transition: 0.2s;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            margin-top: 10px;
            width: 100%;
        }

        .refresh-btn:active {
            box-shadow: 0 2px 5px rgba(0, 240, 255, 0.3);
            transform: translateY(4px);
        }
    </style>
</head>
<body>

    <div class="weather-container">
        <h1>🫧 Right Now 🫧</h1>
        <div id="location-name">Scanning... (◕‿◕✿)</div>
        
        <div id="loading">Locating... 🫧</div>
        
        <div id="weather-content" style="display:none;">
            <div id="temp">--°</div>
            <div id="feels-like">My RealFeel: <span id="apparent">--</span>°</div>
            <div id="status">(>ω<) VIBING</div>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-icon">🫧</div>
                    <div class="stat-label">Wind</div>
                    <div class="stat-value"><span id="wind">--</span> mph</div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">🌊</div>
                    <div class="stat-label">Humidity</div>
                    <div class="stat-value"><span id="humidity">--</span>%</div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon">🪸</div>
                    <div class="stat-label">Pressure</div>
                    <div class="stat-value"><span id="pressure">--</span> in</div>
                </div>
            </div>

            <div class="wide-box">
                <div class="stat-icon">🧴</div>
                <div class="stat-label">UV Index: <span id="uv-number">--</span></div>
                <div class="uv-message" id="uv-text">Checking the rays...</div>
            </div>

            <div class="celestial-box">
                <div class="celestial-title">✨ Celestial Vibes ✨</div>
                <div class="celestial-grid">
                    <div class="celestial-item">
                        <img class="custom-icon" src="https://i.postimg.cc/d7SvJqXf/image.png" alt="Rise">
                        <div class="stat-label">Rise</div>
                        <div class="stat-value" id="sunrise">--:--</div>
                    </div>
                    <div class="celestial-item">
                        <img class="custom-icon" src="https://i.postimg.cc/VSH1zYTG/image.png" alt="Set">
                        <div class="stat-label">Set</div>
                        <div class="stat-value" id="sunset">--:--</div>
                    </div>
                    <div class="celestial-item">
                        <div class="stat-icon" id="moon-icon">🌙</div>
                        <div class="stat-label">Phase</div>
                        <div class="stat-value" id="moon-phase" style="font-size:0.75rem;">--</div>
                    </div>
                </div>
            </div>

            <div class="forecast-title">🫧 Next Few Hours 🫧</div>
            <div class="hourly-container" id="hourly-list">
                </div>

            <div class="forecast-title">🫧 7-Day Outlook 🫧</div>
            <div id="forecast-list">
                </div>
        </div>

        <button class="refresh-btn" onclick="fetchWeather()">REFRESH 🎀</button>
    </div>

    <script>
        const weatherMoji = {
            0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️",
            45: "🌫️", 48: "🌫️", 51: "💧", 53: "💧", 55: "🌧️",
            61: "🎀", 63: "🌧️", 65: "☔", 71: "❄️", 73: "❄️", 75: "⛄",
            80: "🌧️", 81: "☔", 82: "☔", 95: "⚡", 96: "🌩️", 99: "🌩️"
        };

        const weatherDescriptions = {
            0: "Totally Sunny", 1: "Cute & Clear", 2: "A Bit Cloudy", 3: "Overcast Bummer",
            45: "Foggy Mystery", 48: "Foggy Mystery", 51: "Light Drizzle", 53: "Drizzle", 55: "Heavy Drizzle",
            61: "Rainy Day", 63: "Steady Rain", 65: "Heavy Rain", 71: "Snowy Sparkles", 73: "Snowing", 75: "Heavy Snow",
            80: "Sparkly Showers", 81: "Heavy Showers", 82: "Pouring", 95: "Stormy Energy", 96: "Thunderstorm", 99: "Crazy Storm"
        };

        function getDayName(index) {
            if (index === 0) return "Today";
            const d = new Date();
            d.setDate(d.getDate() + index);
            return d.toLocaleDateString('en-US', { weekday: 'short' });
        }

        function formatSunTime(utcString) {
            try {
                const d = new Date(utcString);
                return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            } catch(e) { return "--:--"; }
        }

        function formatHourTime(isoString) {
            if (!isoString) return "--";
            try {
                const timePart = isoString.split('T'); 
                let h = parseInt(timePart.split(':'), 10);
                const ampm = h >= 12 ? 'pm' : 'am';
                h = h % 12 || 12;
                return `${h}${ampm}`;
            } catch(e) { return "--"; }
        }

        function getUVSpeech(uv) {
            if (uv <= 2) return "Low rays! Ur safe to glow! (≧◡≦)";
            if (uv <= 5) return "Moderate! Grab some SPF! 🌸";
            if (uv <= 7) return "High! Lather up, babe! ☀️";
            if (uv <= 10) return "Very High! Protect that skin! ⛱️";
            return "Extreme! Stay in the shade! (ﾟДﾟ;)";
        }

        function getMoonPhase() {
            const date = new Date();
            let year = date.getFullYear(), month = date.getMonth() + 1, day = date.getDate();
            if (month < 3) { year--; month += 12; }
            ++month;
            let jd = 365.25 * year + 30.6 * month + day - 694039.09;
            jd /= 29.5305882;
            let b = Math.round((jd - parseInt(jd)) * 8);
            if (b >= 8) b = 0;
            const phases = [
                { i: "🌑", n: "New Moon" }, { i: "🌒", n: "Waxing Cres" },
                { i: "🌓", n: "1st Quarter" }, { i: "🌔", n: "Waxing Gib" },
                { i: "🌕", n: "Full Moon" }, { i: "🌖", n: "Waning Gib" },
                { i: "🌗", n: "Last Quarter" }, { i: "🌘", n: "Waning Cres" }
            ];
            return phases[b];
        }

        function customRealFeel(temp, wind, humidity) {
            if (temp <= 50 && wind > 3) {
                let chill = 35.74 + (0.6215 * temp) - (35.75 * Math.pow(wind, 0.16)) + (0.4275 * temp * Math.pow(wind, 0.16));
                return Math.round(chill);
            } else if (temp >= 80) {
                let heat = -42.379 + 2.04901523*temp + 10.14333127*humidity - 0.22475541*temp*humidity - 0.00683783*temp*temp - 0.05481717*humidity*humidity + 0.00122874*temp*temp*humidity + 0.00085282*temp*humidity*humidity - 0.00000199*temp*temp*humidity*humidity;
                return Math.round(heat);
            }
            return Math.round(temp);
        }

        async function fetchWeather() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('weather-content').style.display = 'none';

            const geoOptions = { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 };

            navigator.geolocation.getCurrentPosition(async (position) => {
                const { latitude, longitude } = position.coords;
                
                try {
                    const geoUrl = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=14`;
                    const geoRes = await fetch(geoUrl);
                    const geoData = await geoRes.json();
                    const address = geoData.address || {};
                    const locName = address.neighbourhood || address.suburb || address.village || address.town || address.city || "Deep Sea Vibe Zone";
                    document.getElementById('location-name').innerText = `📍 ${locName}`;
                } catch (e) {
                    document.getElementById('location-name').innerText = `📍 Lost in the waves`;
                }

                try {
                    const sunUrl = `https://api.sunrise-sunset.org/json?lat=${latitude}&lng=${longitude}&formatted=0`;
                    const sunRes = await fetch(sunUrl);
                    const sunData = await sunRes.json();
                    document.getElementById('sunrise').innerText = formatSunTime(sunData.results.sunrise);
                    document.getElementById('sunset').innerText = formatSunTime(sunData.results.sunset);
                } catch (e) {
                    document.getElementById('sunrise').innerText = "--:--";
                    document.getElementById('sunset').innerText = "--:--";
                }

                try {
                    const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,surface_pressure,wind_speed_10m,weather_code,uv_index&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto&models=best_match`;
                    const response = await fetch(weatherUrl);
                    const data = await response.json();
                    
                    const current = data.current;
                    const daily = data.daily;
                    const hourly = data.hourly;

                    document.getElementById('temp').innerText = Math.round(current.temperature_2m) + "°";
                    document.getElementById('wind').innerText = Math.round(current.wind_speed_10m);
                    document.getElementById('humidity').innerText = current.relative_humidity_2m;
                    
                    const pressureInHg = (current.surface_pressure * 0.02953).toFixed(1);
                    document.getElementById('pressure').innerText = pressureInHg;
                    
                    document.getElementById('status').innerText = `${weatherDescriptions[current.weather_code] || "Vibing"} ${weatherMoji[current.weather_code] || "✨"}`;

                    const myRealFeel = customRealFeel(current.temperature_2m, current.wind_speed_10m, current.relative_humidity_2m);
                    document.getElementById('apparent').innerText = myRealFeel;

                    const currentUV = Math.round(current.uv_index);
                    document.getElementById('uv-number').innerText = currentUV;
                    document.getElementById('uv-text').innerText = getUVSpeech(currentUV);

                    const moon = getMoonPhase();
                    document.getElementById('moon-icon').innerText = moon.i;
                    document.getElementById('moon-phase').innerText = moon.n;

                    const hourlyList = document.getElementById('hourly-list');
                    hourlyList.innerHTML = '';
                    
                    if (hourly && hourly.time) {
                        const now = new Date();
                        const currentHourString = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}T${String(now.getHours()).padStart(2,'0')}:00`;
                        
                        let startIdx = hourly.time.indexOf(currentHourString);
                        if (startIdx === -1) startIdx = 0;

                        for(let i=0; i < 6; i++) {
                            const idx = startIdx + i;
                            if(idx >= hourly.time.length) break;

                            const hTime = formatHourTime(hourly.time[idx]);
                            const hTemp = Math.round(hourly.temperature_2m[idx]);
                            const hIcon = weatherMoji[hourly.weather_code[idx]] || "✨";
                            
                            hourlyList.innerHTML += `
                                <div class="hourly-box">
                                    <div class="hourly-time">${i===0 ? "Now" : hTime}</div>
                                    <div class="hourly-icon">${hIcon}</div>
                                    <div class="hourly-temp">${hTemp}°</div>
                                </div>
                            `;
                        }
                    }

                    const forecastList = document.getElementById('forecast-list');
                    forecastList.innerHTML = ''; 
                    
                    if (daily && daily.time) {
                        for (let i = 0; i < 7; i++) {
                            const dayName = getDayName(i); 
                            const emoji = weatherMoji[daily.weather_code[i]] || "✨";
                            const maxTemp = Math.round(daily.temperature_2m_max[i]);
                            const minTemp = Math.round(daily.temperature_2m_min[i]);

                            forecastList.innerHTML += `
                                <div class="forecast-row">
                                    <div class="forecast-day">${dayName}</div>
                                    <div class="forecast-icon">${emoji}</div>
                                    <div class="forecast-temps">${maxTemp}° <span class="min-temp">${minTemp}°</span></div>
                                </div>
                            `;
                        }
                    }

                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('weather-content').style.display = 'block';
                } catch (error) {
                    document.getElementById('loading').innerText = "(✖╭╮✖) Network error...";
                }
            }, (err) => {
                document.getElementById('loading').innerText = "Please enable location! 📍";
            }, geoOptions);
        }

        fetchWeather();
    </script>
</body>
</html>
